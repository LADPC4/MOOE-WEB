<script>

  return {  
    data() {

                                  return {

                                          };
                                //})
                                },

                  nextpage : null,
                  lastpage : null,
                  hasMoreItems : false,
                }
            },
    methods: {
      refreshpage(){
          var self = this;
          self.$setState({
                      items : [],
                      pages: null,
                      paging: null,
                      nextpage : null,
                      lastpage: null,
                      hasMoreItems: false,
                      currentpage: null

                                              
                  });
        },
          fetchdata(schguid,disreferenceno) {
            
          var self = this;
          var app = self.$app;
          var fetchpage = 0;
          var udata= { 
            schguid:  schguid,
            disreferenceno: disreferenceno,
            guser: app.data.userdata.guserid,
            es: app.data.userdata.ES,
            jhs: app.data.userdata.JHS,
            shs: app.data.userdata.SHS
          }
          app.preloader.show();
          if (self.currentpage==null) {
            fetchpage=1;
            self.currentpage=fetchpage;
          } else {
            fetchpage=self.nextpage;
            self.currentpage=fetchpage;
          }

          //$base_param = $base_param + '&groupid=' + app.root.userdata.groupid;
          app.request.post($base_url+'mooedisbursements/read_paging.php'+$base_param + '&page=' + fetchpage, JSON.stringify(udata), (rdata) => {
            rdata=JSON.parse(rdata);
            if (rdata.records) {
                var items = self.items.concat(rdata.records);
                // var items =rdata.records;
                var lhasMoreItems=false;
                if (rdata.paging.pages.length>1) lhasMoreItems=true;
                if (self.currentpage==self.lastpage) lhasMoreItems=false;
                //console.log(items)
                self.$setState({
                      items : items,
                      pages: rdata.paging.pages,
                      paging: rdata.paging,
                      lastpage: rdata.paging.pages.length,
                      hasMoreItems: lhasMoreItems

                                              
                  })
                // console.log(self.paging)
            } else {
              self.$setState({
                      
                      hasMoreItems: false

                                              
                  });
            }
            
            
            if (rdata.gameinfo) {
              var gameinfo = rdata.gameinfo;
              self.$setState({
                    gameinfo : gameinfo                                            
                  })
              
            }
            if (rdata.gameoptions) {
              
              var gameoptions = rdata.gameoptions;
              self.$setState({
                    gameoptions : gameoptions                                               
                  })
              
            }
            //get next page  
          //console.log(self.items);
          app.preloader.hide();
          })  
        },
        loadmore() {
        var self = this;
        var app = self.$app;
        var schguid=app.data.userdata.schguid;
        var udata= { 
          schguid:  schguid
        }
        var nextpage=null;

        // console.log(self.hasMoreItems);
        if (self.hasMoreItems==false) return;
        for (idx in self.pages) {
          page=self.pages[idx];
          if (nextpage==null){
            //console.log(page)
            if (page.current_page=='yes'){
              nextpage=0;
            }
          } else {
            nextpage=page.page;
            self.$setState({
              nextpage : nextpage                                            
            })
            self.nextpage=nextpage;
          
            
            if (nextpage==self.lastpage) { 
              self.hasMoreItems = false
              self.$setState({
                hasMoreItems : false                                            
              })
            }
            break;
          }
          
        } 
        var value2= $$('#disreferenceno')[0].value;
        self.fetchdata($$('#schguid')[0].value,value2)


        },
        //send and save form
        savedata(udata) {
            // return;
            var self = this;
            var app = self.$app;
            // //alert(app.root.userdata.groupid);
            // //alert(JSON.stringify($udata));
            // //return ;
            
            // udata.schdivid=app.data.userdata.schdivid;
            udata.guserid=app.data.userdata.guserid;
            udata.schguid=app.data.userdata.schguid;
            udata.schregid=app.data.userdata.schregid; 
            // console.log(udata);

            //
            // console.log(udata);

            //modified post for sending json and file upload
            // var FData = new FormData();
            // FData.append('file',file);                // this is main row
            // FData.append('data',JSON.stringify(udata));
            var apipage="liquidate.php";
            // if (udata.mooedisid!="") {
            //   apipage="update.php";
            // } 
            app.preloader.show();
            app.request.post($base_url+'mooedisbursements/'+apipage+$base_param, JSON.stringify(udata) ,(data)=> {
                  
                  result=JSON.parse(data);
                  if (result.status==1){
                    $$('#my-newDisbursement-form')[0].reset(); 
                    app.popup.close('#my-newDisbursement-screen');
                    var value2= $$('#disreferenceno')[0].value;
                    self.fetchdata($$('#schguid')[0].value,value2)
                  }
                  app.preloader.hide();
                  app.dialog.alert(result.message);
                  
            });

            
            
        },
        //send and delete form
        openpopup(params) {
          var self = this;
          var app = self.$app;
          var params = params.split('|');
          // fundguid,papsdesc,totalamount
          var udata= { 
            mooedisid: params[0]
          }
          app.preloader.show();
          app.request.post($base_url+'mooedisbursements/read_one.php'+$base_param, JSON.stringify(udata) ,(data)=> {
               
                data=JSON.parse(data)
                
                
                app.form.fillFromData('#my-newDisbursement-form',data);
                self.fetchuploads(data.mooedisid);
                
            })



           
           //update form data 
        },
        openfile(params) {

              var self = this;
              var app = self.$app;
              var params = params.split('|');
              // fundguid,papsdesc,totalamount
              var fileguid=params[0];

              downloadfile=$base_url+"fileuploads/download.php?schregid="+app.data.userdata.schregid+"&fileguid="+fileguid

              window.open(downloadfile);
              

        },
        fetchuploads(recowner) {
          // var params = params.split('|');
          // // fundguid,papsdesc,totalamount
          var self = this;
          var app = self.$app;
          var udata= { 
            recowner: recowner
          }
          // app.preloader.show();
          app.request.post($base_url+'fileuploads/read_paging.php'+$base_param, JSON.stringify(udata) ,(data)=> {
               
                data=JSON.parse(data)
                // app.form.fillFromData('#my-newrequest-form',data);
                items = data.records
                self.$setState({
                      fileitems : items

                                              
                  })
                  app.popup.open("#my-newDisbursement-screen")
                app.preloader.hide();
            })



           
           //update form data 
        },
        deletedata(udata) {
            // return;
            var self = this;
            var app = self.$app;
            // //alert(app.root.userdata.groupid);
            // //alert(JSON.stringify($udata));
            // //return ;
            
            // udata.schdivid=app.data.userdata.schdivid;
            udata.guserid=app.data.userdata.guserid;
            // udata.schguid=app.data.userdata.schguid;
            udata.schregid=app.data.userdata.schregid; 
            udata.voidoverride='Y';
            // console.log(udata);

            //
            // console.log(udata);
            app.preloader.show();
            //modified post for sending json and file upload


            app.request.post($base_url+'mooedisbursements/delete.php'+$base_param, JSON.stringify(udata) ,(data)=> {
               
              result=JSON.parse(data)
              if (result.status==1) {
                            
                $$('#my-newDisbursement-form')[0].reset(); 
                self.refreshpage();
                var value2= $$('#disreferenceno')[0].value;
                self.fetchdata($$('#schguid')[0].value,value2)
              }
              app.dialog.alert(result.message);
              app.preloader.hide();
              app.popup.close('#my-newDisbursement-screen');
              
               // $$('.printDV-button')[0].style.display = "block";

           })

           
            
        },
        computenetamt(){
          var self = this;
          var app = self.$app;
          // console.log('Computing net value')
          var va1=$$('#my-newDisbursement-form [name="grossamount"]')[0].checkValidity();
          var va2=$$('#my-newDisbursement-form [name="vattype"]')[0].checkValidity();
          var va3=$$('#my-newDisbursement-form [name="trantype"]')[0].checkValidity();

          
          if (va1 && va2 && va3) {
            var val1=$$('#my-newDisbursement-form [name="grossamount"]')[0].value;
            var val2=$$('#my-newDisbursement-form [name="vattype"]')[0].value;
            var val3=$$('#my-newDisbursement-form [name="trantype"]')[0].value;
            // console.log(app.data.vatmatrix[val3][val2]);
            var vatmtrix=app.data.vatmatrix[val3][val2];


            var netvat=val1 / vatmtrix.vatvalue;
            var bir2306=netvat * vatmtrix.bir2306;
            var bir2307=netvat * vatmtrix.bir2307;
            var netamount=parseFloat(val1) - parseFloat(bir2306) - parseFloat(bir2307);

            $$('#my-newDisbursement-form [name="netvat"]')[0].value=self.numberWithCommas(netvat.toFixed(2));
            $$('#my-newDisbursement-form [name="bir2306"]')[0].value=self.numberWithCommas(bir2306.toFixed(2));
            $$('#my-newDisbursement-form [name="bir2307"]')[0].value=self.numberWithCommas(bir2307.toFixed(2));
            $$('#my-newDisbursement-form [name="netamount"]')[0].value=self.numberWithCommas(netamount.toFixed(2));

          }
          
        },
        numberWithCommas(thisvalue) {
            return thisvalue.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        },
        CreateSubmitData(self) {
          
        },

            // self.fetchdata(app.data.userdata.schguid);
            
            //populate dropdown inputs

              var value2= $$('#disreferenceno')[0].value;
              // var value=obj.value;
              // return;
              // change: function (value) {
              var itemText = [],
                  inputValue = [];
              // console.log('change triggered' );
              // console.log( value);
              self.refreshpage();
              self.fetchdata(value,value2);
              return;

              $$('#schguid')[0].value="";
              for (var i = 0; i < value.length; i++) {
                // itemText.push(value[i].name);
                // inputValue.push(value[i].id);
                $$('#schdescription')[0].value=value[i].name;
                $$('#schguid')[0].value=value[i].id;
                
                // } 
                
              }
            })
            $$('#schdescription').on("change",function(){
