  <div class="page " data-name="Disbursements">

                </div>
                {{/if}}
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>

            <form class="list" id="my-newDisbursement-form">

            <div class="card data-table">
              <div class="card-header">Disbursement Details</div>
              <div class="card-content">
                  <div class="list">
                      <ul >
                        <li>
                          <div class="item-content item-input">
                            <div class="item-inner">
                              <div class="item-title ">Division Information </div>
                              <div class="item-title ">
                                {{this.$app.data.userdata.divdescription}}
                              </div>
                              <div class="item-title ">
                                Division ID : {{this.$app.data.userdata.divcode}}
                              </div>
                              
                            </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">Select Funds Source(Transfer Date | Fund Type)</div>
                            <div class="item-input-wrap">
                              
                              <input type="hidden" id="mooedisid" name="mooedisid" class="mooedisid">
                              <input type="text" id="funddesc" required validate name="funddesc" class="funddesc">

                              <input type="hidden" id="fundyear" name="fundyear" class="fundyear">
                            </div>
                          </div>
                        </li>
                        
                        <!-- <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">Disbursement Voucher</div>
                              <div class="item-input-wrap">
                                <input type="text" name="disreferenceno" required validate  id = "disreferenceno" placeholder="Provide DV Ref No ">
                              </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">Cheque Date</div>
                            <div class="item-input-wrap">
                              <input type="text" name="disrefdate" required validate placeholder="Pick date " id = "disrefdate" class = "disrefdate">
                            </div>
                          </div>
                        </li> -->
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">Disburserment Month</div>
                            <div class="item-input-wrap">
                              <input type="text" id="monthdesc" required validate name="monthdesc" class="monthdesc">
                              <input type="hidden" id="dismonth" name="dismonth" class="dismonth">
                            </div>
                          </div>
                        </li>   
                      </ul>
                  </div>    
              </div>
            </div>
            <div class="card data-table">
              <div class="card-header">Payee Information</div>
              <div class="card-content">
                  <div class="list">
                      <ul >
                       
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">Payee Name</div>
                              <div class="item-input-wrap">
                                <input type="text" name="payee" required validate id = "payee">
                              </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">Payee TIN</div>
                              <div class="item-input-wrap">
                                <input type="text" name="payeetin" required validate id = "payeetin"  pattern="[0-9]*" >
                              </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">DV No.</div>
                              <div class="item-input-wrap">
                                <input type="text" name="orbursno" required validate id = "orbursno">
                              </div>
                          </div>
                        </li>
                      </ul>
                  </div>    
               
              </div>
            </div>
            <div class="card data-table">
              <div class="card-header">Payment Information</div>
              <div class="card-content">
                  <div class="list">
                      <ul >
                        <li class="item-content item-input">

                            <div class="item-title item-label">Account Title</div>
                            <div class="item-input-wrap">
                              <input type="text" id="coadesc" required validate name="coadesc" class="coadesc">
                              <input type="hidden" id="coaguid" name="coaguid" class="coaguid">

                        <li class="item-content item-input">

                            <div class="item-title item-label">Transaction Type</div>

                              <input type="text" id="trandesc" required validate name="trandesc" class="trandesc">
                              <input type="hidden" id="trantype" name="trantype" class="trantype">
                              <input type="hidden" id="taxoverride" name="taxoverride" class="taxoverride">
                            </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">VAT Type</div>
                            <div class="item-input-wrap">
                              <input type="text" id="vatdesc" required validate name="vatdesc" class="vatdesc">
                              <input type="hidden" id="vattype" name="vattype" class="vattype">
                            </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">Particulars</div>
                              <div class="item-input-wrap">
                                <input type="text" name="particulars" required validate id = "particulars">
                              </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">Gross Amount</div>
                              <div class="item-input-wrap">
                                <input type="number" name="grossamount" required validate id="grossamount" @blur="computenetamt()" step="0.01" > <!--  /^(\d+(?:[\.\,]\d{2})?)$/  ^[0-9]*(\.[0-9]{1,2})?$    (?=.*?\d)^\$?(([1-9]\d{0,2}(,\d{3})*)|\d+)?(\.\d{1,2})?$ -->
                              </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">NET VAT</div>
                              <div class="item-input-wrap">
                                <input type="number" name="netvat" readonly required  id = "netvat" @blur="computenetamt()" validate step="0.01">
                              </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">BIR FORM 2306</div>
                              <div class="item-input-wrap">
                                <input type="number" name="bir2306" readonly required  id = "bir2306" @blur="computenetamt()" validate step="0.01">
                              </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">BIR FORM 2307</div>
                              <div class="item-input-wrap">
                                <input type="number" name="bir2307" readonly required  id = "bir2307" @blur="computenetamt()" validate step="0.01">
                              </div>
                          </div>
                        </li>
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title item-label">Net Amount</div>
                              <div class="item-input-wrap">
                                <input type="number" name="netamount" readonly required id = "netamount" validate>
                              </div>
                          </div>
                        </li>
                        {{#if schtypeiu}}
                        <li class="item-content item-input">
                          <div class="item-inner">
                            <div class="item-title">Liquidated</div>
                            <div class="item-after">
                              <label class="toggle toggle-init">
                                <input type="checkbox" name="liquidated"  >
                                <span class="toggle-icon"></span>
                              </label>
                            </div>
                          </div>
                        </li>
                        {{/if}}
                        <li>
                          <div class="item-content item-input">
                            <div class="item-inner">
                              <div class="item-title item-label">Attachments</div>
                              <div class="item-input">
                                <input class="button button-big button-fill" type="file" name="Select Attachment" placeholder="Upload Zip File">
                              </div>
                            </div>
                          </div>
                        </li>
                      </ul>
                  </div>    
               
              </div>
            </div>
            
            <div class="col-100 tablet-33 margin-top">
              <div class="card">
                <div class="card-header">Uploaded Files</div>
                <div class="card-content card-content-padding scrollable">
                  <div class="list media-list">
                    <ul>
                      {{#each fileitems}}
                      <li class="item-content item-content clickable-row" data-href='#' @click="openfile('{{fileguid}}|{{filename}}');">
                        <div class="item-media">
                          <i class="icon f7-icons text-color-teal">document_text_fill</i>
                        </div>
                        <div class="item-inner">
                          <div class="item-title-row">
                            <div class="item-title">{{filename}}</div>
                            <div class="item-after">{{rectimestamp}}</div>
                          </div>
                          <div class="item-text">Size: {{fnumber filesize}}</div>
                        </div>
                      </li>
                      {{/each}}
                    </ul>
                  </div>
                </div>
              </div>
            </div>
            <div class="row margin-horizontal margin-bottom">
              <div class="col-100 tablet-33 margin-top">
                <div class="card">
                  <div class="card-header">Transaction Timeline</div>
                  <div class="timeline timeline-sides no-margin no-padding">
                    {{#each timelines}}
                    <div class="timeline-item">
                      <div class="timeline-item-date"> <small> {{transactiondate}}</small> </div>
                      <div class="timeline-item-divider"></div>
                      <div class="timeline-item-content"> <small> {{name}} : {{remarks}}</small>
                        
                      </div>
                    </div>
                    {{/each}}

                  </div>
                </div>
              </div>
            </div>
          
          
            <div class="list">
              <div class="block block-strong row">
                  {{ #if wfedit}}
                  <div class="col"><a href="#" class="col button button-fill newDisbursement-button" @click="submitclick()">Submit</a> </div>
                  {{/if}}
                  {{ #if wfprint}}
                  <div class="col"><a href="#" class="col button button-fill printDV-button" @click="print()">Print</a></div>
                  {{/if}}
                 
                  <div class="col"><a href="#" class="col button button-fill " @click="closedetails();">Cancel</a></div>

                </div>
              </div>
            </form>
            
            
  
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script>

  return {  
    data() {
                return {

                  items : [],
                  fileitems : [],
                  timelines : [],
                  gameoptions : [],
                  wfedit: true,
                  pages : null,
                  schtypeiu : null,
                  paging: function() {
                                //var geventid=self.$route.params.geventid;
                                //var udata= { 
                                //  geventid:  geventid
                                //}
                                //app.request.post($base_url+'gameevents/read_one.php'+$base_param, JSON.stringify(udata) ,(data)=> {
                                //    //create datepickers
                                //    
                                //    data=JSON.parse(data)
                                //    console.log(data);
                                  return {
                                    paging: null,
                                          };
                                //})
                                },
                  currentpage : null,
                  nextpage : null,
                  lastpage : null,
                  hasMoreItems : false,
                  mooedisid: null,
                  dvdetails: null
                }
            },
    methods: {
          refreshpage(){
            var self = this;
            self.$setState({
                        items : [],
                        fileitems : [],
                        timelines : [],
                        pages: null,
                        paging: null,
                        nextpage : null,
                        lastpage: null,
                        hasMoreItems: false,
                        currentpage: null,
                        mooedisid: null,
                        dvdetails: null,
                        wfprint:null,
                        wfedit:true

                                                
                    });
          },
          fetchdata(schguid) {

          var self = this;
          var app = self.$app;
          var fetchpage = 0;
          var udata= { 
            schguid:  schguid,
            guser: app.data.userdata.guserid,
            es: app.data.userdata.ES,
            jhs: app.data.userdata.JHS,
            shs: app.data.userdata.SHS
          }
          app.preloader.show();
          if (self.currentpage==null) {
            fetchpage=1;
            self.currentpage=fetchpage;
          } else {
            fetchpage=self.nextpage;
            self.currentpage=fetchpage;
          }

          //$base_param = $base_param + '&groupid=' + app.root.userdata.groupid;
          app.request.post($base_url+'mooedisbursements/read_paging.php'+$base_param + '&page=' + fetchpage, JSON.stringify(udata), (rdata) => {
            rdata=JSON.parse(rdata);
            if (rdata.records) {
                // var items = self.items.concat(rdata.records);
                var items = self.items.concat(rdata.records);
                var lhasMoreItems=false;
                if (rdata.paging.pages.length>1) lhasMoreItems=true;
                if (self.currentpage==self.lastpage) lhasMoreItems=false;
                console.log(lhasMoreItems)
                self.$setState({
                      items : items,
                      pages: rdata.paging.pages,
                      paging: rdata.paging,
                      lastpage: rdata.paging.pages.length,
                      hasMoreItems: lhasMoreItems

                                              
                  })
                // console.log(self.paging)
            } else {
              self.$setState({
                      
                      hasMoreItems: false

                                              
                  });
            }
            
            if (rdata.gameinfo) {
              var gameinfo = rdata.gameinfo;
              self.$setState({
                    gameinfo : gameinfo                                            
                  })
              
            }
            if (rdata.gameoptions) {
              
              var gameoptions = rdata.gameoptions;
              self.$setState({
                    gameoptions : gameoptions                                               
                  })
              
            }
            //get next page  
          //console.log(self.items);
          app.preloader.hide();
          })  
        },
        loadmore() {
        var self = this;
        var app = self.$app;
        var schguid=app.data.userdata.schguid;
        var udata= { 
          schguid:  schguid
        }
        var nextpage=null;

        // console.log(self.hasMoreItems);
        if (self.hasMoreItems==false) return;
        for (idx in self.pages) {
          page=self.pages[idx];
          if (nextpage==null){
            //console.log(page)
            if (page.current_page=='yes'){
              nextpage=0;
            }
          } else {
            nextpage=page.page;
            self.$setState({
              nextpage : nextpage                                            
            })
            self.nextpage=nextpage;
          
            
            if (nextpage==self.lastpage) { 
              self.hasMoreItems = false
              self.$setState({
                hasMoreItems : false                                            
              })
            }
            break;
          }
          
        } 
        self.fetchdata(app.data.userdata.schdivid);


        },
        //send and save form
        savedata(udata,file) {
            // return;
            var self = this;
            var app = self.$app;
            // //alert(app.root.userdata.groupid);
            // //alert(JSON.stringify($udata));
            // //return ;
            
            // udata.schdivid=app.data.userdata.schdivid;
            udata.guserid=app.data.userdata.guserid;
            udata.schguid=app.data.userdata.schdivid;
            udata.schregid=app.data.userdata.schregid; 
            udata.fundguid=udata.parentfund;
            udata.sdodis="Y";
            // console.log(udata);

            //
            // console.log(udata);
            app.preloader.show();
            //modified post for sending json and file upload
            var FData = new FormData();
            FData.append('file',file);                // this is main row
            FData.append('data',JSON.stringify(udata));
            var apipage="create.php";
            if (udata.mooedisid!="") {
              apipage="update.php";
            } 


            app.request({
                    url: $base_url+'mooedisbursements/'+apipage+$base_param, 
                    method: 'POST', 
                    data: FData,
                    cache: false, 
                    dataType: 'application/json',
                    crossDomain: true, 
                    contentType: 'multipart/form-data',
                    processData: true, 
                    success: function (data){
                          result=JSON.parse(data);
                          app.preloader.hide();
                          if (result.status==1) {
                            
                            $$('#my-newDisbursement-form')[0].reset(); 
                            app.popup.close('#my-newDisbursement-screen');
                            self.refreshpage();
                            self.fetchdata(app.data.userdata.schdivid);
                          }
                          app.dialog.alert(result.message);
                          
                      }
            });
            
        },
        closedetails(){
          app.preloader.hide();
          app.popup.close("#my-newDisbursement-screen")
        },
        //send and delete form

        openpopup(params) {
          var self = this;
          var app = self.$app;
          var params = params.split('|');
          // fundguid,papsdesc,totalamount
          var udata= { 
            mooedisid: params[0],
            sdodis: "Y"
          }
         
          $$('#netvat')[0].value=0;
            $$('#bir2306')[0].value=0;
            $$('#bir2307')[0].value=0;
          app.preloader.show();
          app.request.post($base_url+'mooedisbursements/read_one.php'+$base_param, JSON.stringify(udata) ,(data)=> {
               
                data=JSON.parse(data)
                
                data.fullname= app.data.userdata.gfirstname  + ' ' +   app.data.userdata.gmiddlename + ' ' +   app.data.userdata.glastname;
                data.roledescription= app.data.userdata.roledescription;
                data.divdescription=app.data.userdata.divdescription;           
                
                app.form.fillFromData('#my-newDisbursement-form',data);
                self.fetchuploads(params[0]);
                self.fetchtimelines(params[0]);
                self.$setState({
                  mooedisid: data.mooedisid,
                  dvdetails: data,
                  wfprint: data.wfprint,
                  wfedit: data.wfedit
                });
                // $$('.printDV-button')[0].style.display = "block";

            })



           
           //update form data 
        },
        print(){
          var self = this;
              var app = self.$app;
           // console.log(self.dvdetails);
                    // generateBlob(self.dvdetails);
                    // app.views.main.router.navigate('/dv/')
                    var netamount=parseFloat(self.dvdetails.netamount);

                    self.dvdetails.gamtwords=app.methods.toWords(netamount.toFixed(2));
                    self.dvdetails.schdescription=app.data.userdata.schdescription;
                    window.window.open("./forms/dv/dv.html?data=" + encodeURIComponent(JSON.stringify(self.dvdetails)) , '_blank' ,"toolbar=no,scrollbars=yes,resizable=yes,fullscreen=yes,menubar=no,location=no");
                 
        },
        openfile(params) {

              var self = this;
              var app = self.$app;
              var params = params.split('|');
              // fundguid,papsdesc,totalamount
              var fileguid=params[0];

              downloadfile=$base_url+"fileuploads/download.php?schregid="+app.data.userdata.schregid+"&fileguid="+fileguid

              window.open(downloadfile);
              

        },
        fetchuploads(recowner) {
          // var params = params.split('|');
          // // fundguid,papsdesc,totalamount
          var self = this;
          var app = self.$app;
          var udata= { 
            recowner: recowner
          }
          // app.preloader.show();
          app.request.post($base_url+'fileuploads/read_paging.php'+$base_param, JSON.stringify(udata) ,(data)=> {
               
                data=JSON.parse(data)
                // app.form.fillFromData('#my-newrequest-form',data);
                items = data.records
                self.$setState({
                      fileitems : items

                                              
                  })
                  app.popup.open("#my-newDisbursement-screen")
                app.preloader.hide();
            })



           
           //update form data 
        },
        fetchtimelines(recowner) {
          // var params = params.split('|');
          // // fundguid,papsdesc,totalamount
          var self = this;
          var app = self.$app;
          var udata= { 
            recowner: recowner
          }
          // app.preloader.show();
          app.request.post($base_url+'transactions/read_pagingD.php'+$base_param, JSON.stringify(udata) ,(data)=> {
               
                data=JSON.parse(data)
                // app.form.fillFromData('#my-newrequest-form',data);
                items = data.records
                self.$setState({
                      timelines : items

                                              
                  })
                app.popup.open("#my-newrequest-screen")
                app.preloader.hide();
            })



           
           //update form data 
        },
        deletedata(udata) {
           
        },
        computenetamt(){
          var self = this;
          var app = self.$app;
          // console.log('Computing net value')
          var va1=$$('#my-newDisbursement-form [name="grossamount"]')[0].checkValidity();
          var va2=$$('#my-newDisbursement-form [name="vattype"]')[0].checkValidity();
          var va3=$$('#my-newDisbursement-form [name="trantype"]')[0].checkValidity();
          var va4=$$('#my-newDisbursement-form [name="netvat"]')[0].checkValidity();
          var va5=$$('#my-newDisbursement-form [name="bir2306"]')[0].checkValidity();
          var va6=$$('#my-newDisbursement-form [name="bir2307"]')[0].checkValidity();

          
          if (va1 && va2 && va3 && va4 && va5 && va6) {
            var val1=$$('#my-newDisbursement-form [name="grossamount"]')[0].value;
            var val2=$$('#my-newDisbursement-form [name="vattype"]')[0].value;
            var val3=$$('#my-newDisbursement-form [name="trantype"]')[0].value;
            var val4=$$('#my-newDisbursement-form [name="netvat"]')[0].value;
