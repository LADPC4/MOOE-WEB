            app.preloader.show();
            app.request.post($base_url+'funds/'+apipage+$base_param, JSON.stringify(udata) ,(data)=> {

          var params = params.split('|');

            fundguid: params[0]

          app.preloader.show();
          app.request.post($base_url+'funds/read_one.php'+$base_param, JSON.stringify(udata) ,(data)=> {
               
                data=JSON.parse(data)
                app.form.fillFromData('#my-newtransfer-form',data);
                self.$setState({
                  fundguid : data.fundguid,
                  fundackid: data.fundackid

                self.fetchuploads(data.fundguid);

          $$('#delete-button').on('click', function(){

                app.popup.open("#my-newtransfer-screen")
                app.preloader.hide();

            fetchshools: function (schdivid,idel,descel) {
          //continue to dashboard
          app.preloader.show();
          var udata= { 
            "schdivid":schdivid,        
          }
          
          app.request.post($base_url+'schools/schools_by_div.php' ,  JSON.stringify(udata) , (data)=> {

            // app.$setState({
            //   sdolist: data

            app.data.schlist=data;
            var sdolistel = app.autocomplete.create({
              inputEl: '.'+descel,

              source: function (query, render) {
                var results = [];
                //  if (query.length === 0) {
                //    render(results);
                //    return;
                //  }
                
                $$('#'+idel)[0].value="";
                schlist=app.data.schlist.records;
                //  console.log(schlist);
                for (var i = 0; i < schlist.length; i++) {
                  if (schlist[i].schdescription.toLowerCase().indexOf(query.toLowerCase()) >= 0) {
                    results.push({ "id": schlist[i].schguid,
                              "name": schlist[i].schoolid +" | " + schlist[i].schdescription,
                              "ES" : schlist[i].ES, 
                              "JHS" : schlist[i].JHS,
                              "SHS" : schlist[i].SHS 
                  
                                } ); //
                      
                    
                  }
                }
                
                render(results);

                    $$('#'+descel)[0].value=value[i].name;

                    app.methods.fetchschrequests(value[i].id)

                    var jhs=value[i].JHS;
                    var shs=value[i].SHS;
                    app.methods.fetchaccounts(value[i].id,es,jhs,shs);
                    app.methods.fetchpaplist(false,es,jhs,shs);
                
                  }
                  
                },

            app.preloader.hide();

        loadmore() {
        var self = this;
        var app = self.$app;
        var schguid=app.data.userdata.schguid;
        var udata= { 
          schguid:  schguid
        }
        var nextpage=null;

        // console.log(self.hasMoreItems);
        if (self.hasMoreItems==false) return;
        for (idx in self.pages) {
          page=self.pages[idx];
          if (nextpage==null){
            //console.log(page)
            if (page.current_page=='yes'){
              nextpage=0;
            }
          } else {
            nextpage=page.page;
            self.$setState({
              nextpage : nextpage                                            
            })
            self.nextpage=nextpage;
          
            
            if (nextpage==self.lastpage) { 
              self.hasMoreItems = false
              self.$setState({
                hasMoreItems : false                                            
              })
            }
            break;
          }
          
        } 
        self.fetchdata(app.data.userdata.schdivid,"");


        },
